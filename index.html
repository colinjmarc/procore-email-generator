<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procore Email Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
  .container { max-width: 900px; margin: 0 auto; padding: 20px; }
  header { background: #e07b00; color: white; padding: 20px 30px; margin-bottom: 30px; border-radius: 8px; }
  header h1 { font-size: 24px; }
  header p { font-size: 14px; opacity: 0.9; margin-top: 4px; }
  .card { background: white; border-radius: 8px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .step-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .step-num { background: #e07b00; color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; flex-shrink: 0; }
  .step-header h2 { font-size: 18px; color: #333; }
  label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; margin-top: 14px; }
  input[type="text"], input[type="password"], textarea, select {
    width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px;
    font-size: 14px; font-family: inherit; transition: border-color 0.2s;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #e07b00; }
  .api-key-wrap { position: relative; }
  .api-key-wrap input { padding-right: 60px; }
  .show-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #e07b00; cursor: pointer; font-size: 13px; font-weight: 600; }
  .upload-area { border: 2px dashed #ddd; border-radius: 8px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 16px; }
  .upload-area:hover, .upload-area.drag-over { border-color: #e07b00; background: #fff8f0; }
  .upload-area .icon { font-size: 36px; margin-bottom: 8px; }
  .upload-area p { font-weight: 600; color: #444; }
  .upload-area small { color: #888; font-size: 12px; }
  .file-info { background: #f0f9f0; border: 1px solid #b8e0b8; border-radius: 6px; padding: 10px 14px; font-size: 13px; color: #2d6a2d; display: none; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .generate-btn { background: #e07b00; color: white; border: none; padding: 14px 32px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 8px; }
  .generate-btn:hover { background: #c96a00; }
  .generate-btn:disabled { background: #ccc; cursor: not-allowed; }
  .error-box { background: #fde8e8; border: 1px solid #f5c0c0; border-radius: 6px; padding: 12px 16px; color: #c0392b; font-size: 13px; margin-top: 12px; display: none; }
  .output-area { display: none; }
  .output-area textarea { min-height: 400px; font-family: 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.6; }
  .copy-btn { background: #2d6a2d; color: white; border: none; padding: 10px 24px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
  .copy-btn:hover { background: #1e4d1e; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .groq-link { font-size: 12px; color: #888; margin-top: 4px; }
  .groq-link a { color: #e07b00; }
</style>
</head>
